<title>Petite Gem Quote PWA</title>
<style>
:root{--bg:#f7f2eb;--card:#fffdf8;--ink:#20262b;--muted:#68747c;--line:#ded4c7;--accent:#0f766e;--accent2:#115e59;--gold:#c9a44d;--soft:#fff6d6;--danger:#b91c1c;}
*{box-sizing:border-box} html,body{max-width:100%;overflow-x:hidden;-webkit-text-size-adjust:100%} body{margin:0;background:linear-gradient(180deg,rgba(15,118,110,.13),transparent 250px),var(--bg);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif} button,input,select,textarea{font:inherit} input,select,textarea{font-size:16px} button{min-height:42px;border:0;border-radius:10px;background:var(--accent);color:white;font-weight:850;padding:0 14px} button.secondary{background:#eef5f2;color:var(--accent2)} button.warn{background:#fff1c2;color:#6b4b04} button.danger{background:#fee2e2;color:#991b1b} button:disabled{background:#a8b0b4;color:white} input,select{width:100%;min-width:0;min-height:42px;border:1px solid var(--line);border-radius:10px;background:white;color:var(--ink);padding:9px 11px} input:focus,select:focus{outline:none;border-color:#dd9700;box-shadow:0 0 0 3px rgba(221,151,0,.13)}
.app{width:100%;max-width:720px;margin:0 auto;padding:calc(10px + env(safe-area-inset-top)) 10px calc(24px + env(safe-area-inset-bottom));overflow-x:hidden} .hero{display:flex;align-items:center;gap:10px;padding:4px 2px 10px} .logo{width:48px;height:48px;border-radius:50%;object-fit:cover;box-shadow:0 10px 26px rgba(79,55,11,.12)} h1{margin:0;font:800 26px/1 Georgia,"Times New Roman",serif} h2{margin:0;font-size:18px} .muted{color:var(--muted)} .small{font-size:12px;font-weight:750;color:var(--muted)}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:4px 0 10px;position:sticky;top:0;z-index:3;background:rgba(247,242,235,.96);padding:4px 0} .tabs button{background:#edf4f2;color:#164e46} .tabs button.active{background:var(--accent);color:white} .panel{display:none} .panel.active{display:block}
.card{background:rgba(255,253,248,.96);border:1px solid rgba(201,164,77,.34);border-radius:12px;box-shadow:0 10px 24px rgba(58,47,28,.06);margin-bottom:10px;padding:11px;max-width:100%;overflow:hidden} .title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px} label{display:grid;gap:5px;color:var(--muted);font-size:12px;font-weight:850;text-transform:uppercase} .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px} .wide{grid-column:1/-1} .row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end;max-width:100%} .actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center} .status{font-size:13px;font-weight:750;color:var(--muted);margin-top:8px} .error{color:var(--danger)}
.list{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:10px;background:white} .list:empty{display:none} .result,.item{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;width:100%;text-align:left;padding:10px;border-bottom:1px solid var(--line);background:white;color:var(--ink)} .result:nth-child(odd),.item:nth-child(odd){background:#fff9e5} .result:last-child,.item:last-child{border-bottom:0} .thumb{width:46px;height:46px;border-radius:10px;background:#f4f4f4;border:1px solid var(--line);object-fit:cover;display:grid;place-items:center;color:var(--muted);font-size:12px;font-weight:800;overflow:hidden} .result strong,.item strong{display:block;font-size:16px} .result small,.item small{display:block;color:var(--muted);font-size:12px;line-height:1.35;margin-top:3px}
.preview{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:var(--soft);border:1px solid #ead79a;border-radius:12px;margin:12px 0;padding:11px} .preview:empty{display:none} .metric{display:grid;gap:2px} .metric b{color:var(--muted);font-size:11px;text-transform:uppercase} .total{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:13px;border-radius:12px;background:var(--accent);color:white;font-weight:950;font-size:20px;margin-top:10px}
.quote{display:none;background:#fffdf8;border-radius:14px;padding:16px} .quote.show{display:block} .quote-head{display:flex;gap:12px;align-items:center;border-bottom:4px solid var(--gold);padding-bottom:12px;margin-bottom:14px} .quote-head img{width:66px;height:66px;border-radius:50%;object-fit:cover} .quote-head h3{margin:0;font:800 30px/1 Georgia,"Times New Roman",serif} .quote-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px} .quote-meta div{border-bottom:1px solid #d6c69c;padding-bottom:7px} .quote-meta strong{display:block;color:var(--muted);font-size:11px;text-transform:uppercase} table{width:100%;border-collapse:collapse} th{background:#f7eab5;text-align:left} th,td{padding:9px 6px;border-bottom:1px solid #d6c69c} td:last-child,th:last-child{text-align:right} .note{color:var(--muted);font-size:13px;margin:14px 0 6px}

.db-tools summary{display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:16px;font-weight:900;list-style:none}.db-tools summary::-webkit-details-marker{display:none}.db-tools[open] summary{margin-bottom:10px}.compact-actions button{min-width:88px}.quote-panel-spacer{height:1px}
@media(max-width:640px){.app{padding-left:8px;padding-right:8px}.hero{margin-top:2px}.logo{width:42px;height:42px}h1{font-size:25px}.tabs button{font-size:18px;min-height:48px}.grid{grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}.card{padding:10px}.row{grid-template-columns:1fr}.row button{width:100%}.actions button{flex:1}.preview{grid-template-columns:1fr}.result,.item{grid-template-columns:40px minmax(0,1fr)}.thumb{width:40px;height:40px}.result strong,.item strong{font-size:15px;line-height:1.18}.result small,.item small{font-size:11px}.quote-meta{grid-template-columns:1fr}.hide-mobile{display:none}}
@media(max-width:420px){.grid{grid-template-columns:1fr}.tabs{gap:6px}.tabs button{font-size:17px}.hero .small{font-size:11px}h1{font-size:24px}label{font-size:11px}.title h2{font-size:17px}}

@media(max-width:640px){.grid,.quote-meta{grid-template-columns:1fr} .row{grid-template-columns:1fr} h1{font-size:27px} .result,.item{grid-template-columns:auto 1fr} .result>span:last-child{display:none} table{font-size:13px}}
@media print{body{background:white} .no-print{display:none!important} .app{max-width:none;padding:0} .quote{display:block!important;box-shadow:none;border-radius:0}}

.search-row{margin-top:6px}

.quote-settings{display:none}

.item-editor .grid{grid-template-columns:1fr 1fr}
.item-editor label.wide{grid-column:1/-1}
.item-editor button#add{width:100%;margin-top:8px}
@media(max-width:640px){.hero{padding-top:0}.hero .logo{width:34px;height:34px}h1{font-size:22px}.card.search-card,.card:first-of-type{padding:10px}.list{margin-top:8px}.result{padding:9px}.item-editor{padding:10px}.item-editor input,.item-editor select{min-height:40px}.item-editor .grid{gap:7px}.item-editor label{font-size:10px}.search-card{margin-bottom:8px}}

.phone-tabs{display:none!important}.db-ui-hidden{display:none!important}.image-search-label{margin-top:8px}.image-search-label input{padding:8px;background:#fff}.results-collapsed #results{display:none}.result-toggle{position:fixed;right:12px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:20;min-height:42px;border-radius:999px;box-shadow:0 10px 24px rgba(15,118,110,.24);padding:0 16px}.result-toggle[hidden]{display:none}.price-tools{padding:9px 10px}.price-tools .row{grid-template-columns:1fr auto}.price-tools b{color:var(--accent2)}.price-tools button{min-width:108px}

function n(v){const x=parseFloat(String(v??'').replace(',','.').replace(/[^0-9.-]/g,''));return Number.isFinite(x)?x:0} function money(v){return new Intl.NumberFormat('en-US',{maximumFractionDigits:2}).format(n(v))} function plain(v){const r=Math.round(n(v)*100)/100;return Number.isInteger(r)?String(r):String(r).replace(/0+$/,'').replace(/\.$/,'')} function quoteRound(v){const x=n(v);return x>0?Math.ceil(x/100)*100:0} function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')} function norm(v){return String(v??'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase()} function silver(m){const t=norm(m);return t.includes('bac')||t.includes('silver')} function age(m){const t=norm(m);if(t.includes('10k'))return 52;if(t.includes('14k'))return 68.5;if(t.includes('18k'))return 85;return 0} function infer(r){const t=norm(`${r?.material||''} ${r?.description||''} ${r?.product||''}`);if(t.includes('bac'))return 'Bạc';if(t.includes('18k')||n(r?.gold_age)==85)return 'Vàng 18K';if(t.includes('14k')||n(r?.gold_age)==68.5)return 'Vàng 14K';if(t.includes('10k')||n(r?.gold_age)==52)return 'Vàng 10K';if(t.includes('vang'))return 'Vàng 10K';return r?.material||''} function imageSrc(r){const u=String(r?.image_url||'');return u.startsWith('data:')?u:''}
function marketNum(v){let s=String(v??'').replace(/[^\d,.]/g,'');if(!s)return 0;if(s.includes(',')&&s.includes('.'))s=s.replaceAll('.','').replace(',','.');else if((s.match(/\./g)||[]).length>1)s=s.replaceAll('.','');else if((s.match(/,/g)||[]).length>1)s=s.replaceAll(',','');else if(s.includes(','))s=s.replace(',','.');return n(s)} function normGold(v){v=marketNum(v);if(v>=1000000)return v/10000;if(v>=100000)return v/10;if(v>=10&&v<100)return v*1000;if(v>=100&&v<1000)return v*100;return v} function normSilver(v){v=marketNum(v);if(v>=100000)return v/1000;if(v>=1&&v<20)return v*1000;return v} async function fetchText(url){const tries=[url,'https://api.allorigins.win/raw?url='+encodeURIComponent(url)];let last;for(const u of tries){try{const r=await fetch(u,{cache:'no-store'});if(r.ok)return await r.text();last=r.status}catch(e){last=e}}throw last||new Error('fetch failed')} function htmlText(x){return x.replace(/<script[\s\S]*?<\/script>/gi,' ').replace(/<style[\s\S]*?<\/style>/gi,' ').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ')} function nums(t){return (t.match(/\d+(?:[.,]\d{1,3}){0,3}/g)||[]).map(marketNum).filter(Boolean)} async function loadOnlinePrices(){if(el.priceStatus)el.priceStatus.textContent='Đang cập nhật giá...';if(el.refreshPrices)el.refreshPrices.disabled=true;let gold=0,silverCay=0;try{const gj=await fetchText('https://edge-api.pnj.io/ecom-frontend/v1/get-gold-price?zone=00');const vals=(gj.match(/(?:sell|ban|bán|gia_ban|giaban|price_sell|sellprice|selling)["']?\s*:\s*["']?[\d,.]+/gi)||[]).map(normGold).filter(x=>x>=12000&&x<=25000);gold=vals.length?Math.max(...vals):0}catch(e){} if(!gold){try{const t=htmlText(await fetchText('https://www.pnj.com.vn/site/gia-vang'));const vals=nums(t).map(normGold).filter(x=>x>=12000&&x<=25000);gold=vals.length?Math.max(...vals):0}catch(e){}} try{const t=htmlText(await fetchText('https://giabac.vn/'));const vals=nums(t).map(normSilver).filter(x=>x>=1000&&x<=6000);silverCay=vals.length?Math.max(...vals):0}catch(e){} if(gold)el.goldPrice.value=plain(gold);if(silverCay)el.silverPrice.value=plain(silverCay/10);if(!gold&&!silverCay){if(el.priceStatus)el.priceStatus.textContent='Không tải được giá online, đang giữ giá trong app.';if(el.refreshPrices)el.refreshPrices.disabled=false;return} if(el.priceStatus)el.priceStatus.textContent=`Vàng ${money(el.goldPrice.value)}/chỉ · Bạc ${money(el.silverPrice.value)}/chỉ`;refresh();renderItems();if(el.refreshPrices)el.refreshPrices.disabled=false}
function bundledDb(){return JSON.parse(document.getElementById('bundled-db').textContent||'[]')}
function loadDb(){let bundled=bundledDb();try{const raw=localStorage.getItem('petiteGemOfflineProductDB_v2');const local=raw?JSON.parse(raw):null;products=Array.isArray(local)&&local.length?local:bundled}catch(e){products=bundled}if(!Array.isArray(products)||!products.length)products=bundled;updateDbCount()} function saveDb(){localStorage.setItem('petiteGemOfflineProductDB_v2',JSON.stringify(products));updateDbCount()} function updateDbCount(){el.dbCount.textContent=products.length+' sản phẩm'}
function score(r,tokens){const hay=norm([r.description,r.product,r.material,r.stone,r.stone_size,r.searchKey].join(' '));const name=norm(r.description||r.product||'');let s=0;for(const tok of tokens){if(name.includes(tok))s+=8;else if(hay.includes(tok))s+=4;else return -1}if(name.includes(tokens.join(' ')))s+=15;return s}
function searchProducts(q,limit=9999){const tokens=norm(q).split(/\s+/).filter(Boolean);if(!tokens.length)return [];let arr=products.map((r,i)=>({...r,_i:i,_score:score(r,tokens)})).filter(r=>r._score>=0).sort((a,b)=>b._score-a._score||String(a.description).localeCompare(String(b.description),'vi'));if(!arr.length&&tokens[0])arr=products.map((r,i)=>({...r,_i:i})).filter(r=>norm([r.description,r.product,r.searchKey].join(' ')).includes(tokens[0]));return arr.slice(0,limit)}
function resultHtml(r,i,choose='Chọn'){const img=imageSrc(r);return `<button class="result" type="button" data-i="${i}"><span class="thumb">${img?`<img src="${esc(img)}" style="width:100%;height:100%;object-fit:cover">`:'Ảnh'}</span><span><strong>${esc(r.description||r.product)}</strong><small>${esc(infer(r))} · TL ${esc(r.gold_weight_raw||'-')} · Công ${money(r.labor_x1000)} · Đá ${money(r.stone_x1000)} · ${esc(r.stone||'')} ${esc(r.stone_size||'')} · ${esc(r.productId||'')}</small></span><span class="small">${choose}</span></button>`}
function updateResultsToggle(){if(!el.toggleResults||!el.searchCard)return;const has=results.length>0;el.toggleResults.hidden=!has;el.toggleResults.textContent=resultsCollapsed?`Hiện ${results.length} kết quả`:'Ẩn kết quả';el.searchCard.classList.toggle('results-collapsed',resultsCollapsed)}

async function fileToImageData(file){return await new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=()=>resolve(String(reader.result||''));reader.onerror=reject;reader.readAsDataURL(file)})}
async function imageFingerprint(src){return await new Promise((resolve)=>{const img=new Image();img.onload=()=>{const canvas=document.createElement('canvas');canvas.width=8;canvas.height=8;const ctx=canvas.getContext('2d',{willReadFrequently:true});ctx.drawImage(img,0,0,8,8);const data=ctx.getImageData(0,0,8,8).data;const vals=[];for(let i=0;i<data.length;i+=4){vals.push(Math.round((data[i]+data[i+1]+data[i+2])/3))}resolve(vals)};img.onerror=()=>resolve([]);img.src=src})}
function imageDistance(a,b){if(!a.length||!b.length||a.length!==b.length)return 1e9;let d=0;for(let i=0;i<a.length;i++){const x=a[i]-b[i];d+=x*x}return Math.sqrt(d/a.length)}
async function doImageSearch(){const file=el.imageSearch?.files?.[0];if(!file)return;el.status.textContent='Đang search ảnh...';const uploaded=await fileToImageData(file);const fp=await imageFingerprint(uploaded);const candidates=products.filter(r=>imageSrc(r));const scored=[];for(const r of candidates){const dist=imageDistance(fp,await imageFingerprint(imageSrc(r)));if(Number.isFinite(dist))scored.push({...r,_imageDist:dist})}results=scored.sort((a,b)=>a._imageDist-b._imageDist).slice(0,20);el.results.innerHTML=results.map((r,i)=>resultHtml(r,i,'Chọn')).join('');el.results.querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>selectResult(+b.dataset.i));setResultsCollapsed(false);el.status.textContent=results.length?`Gợi ý ${results.length} sản phẩm theo ảnh.`:'DB phone chưa có ảnh để so sánh. Bấm Update phone PWA trên desktop rồi upload lại.'}

function selectResult(i){selected=results[i];fillQuote(selected);showTab('quote');refresh();placeEditorAfterResult(i);setResultsCollapsed(true);setTimeout(()=>document.getElementById('itemEditor')?.scrollIntoView({behavior:'smooth',block:'start'}),50)} function placeEditorAfterResult(i){const editor=document.getElementById('itemEditor');if(!editor)return;editor.classList.add('active');el.searchCard?.insertAdjacentElement('afterend',editor);}
function fillQuote(r){el.selected.textContent=r.productId||'Đã chọn';el.item.value=r.description||r.product||'';el.material.value=infer(r);el.weight.value=r.gold_weight_raw||'';el.labor.value=r.labor_x1000?plain(r.labor_x1000):'';el.stonePrice.value=r.stone_x1000?plain(r.stone_x1000):'';el.stone.value=[r.stone,r.stone_size].filter(Boolean).join(' ');if(!el.profit.value)el.profit.value=defaultProfit(el.material.value)} function defaultProfit(m){if(silver(m))return '2000';const a=age(m);if(a==52)return '3000';if(a==68.5)return '3500';if(a==85)return '4500';return ''}
function calc(row={}){const mat=el.material.value||infer(row);const w=n(el.weight.value||row.gold_weight_raw);const labor=n(el.labor.value||row.labor_x1000);const stone=n(el.stonePrice.value||row.stone_x1000);const gp=n(el.goldPrice.value)||DEFAULT_GOLD_PRICE;const sp=n(el.silverPrice.value)||DEFAULT_SILVER_PRICE;const a=age(mat)||n(row.gold_age)||0;let chi=0;if(silver(mat))chi=(w/100)*sp+labor+stone;else if(w&&a&&gp)chi=(w/100)*(a/100)*gp+labor+stone;else chi=labor+stone;const override=n(el.override.value);const profit=n(el.profit.value);const thu=quoteRound(override>0?override:chi+profit);return {mat,w,labor,stone,a,chi,profit:thu-chi,thu}}

function clearAll(){selected=null;results=[];items=[];['search','item','weight','labor','stonePrice','stone','profit','override'].forEach(k=>el[k].value='');el.goldPrice.value=DEFAULT_GOLD_PRICE;el.material.value='';el.silverPrice.value=DEFAULT_SILVER_PRICE;el.selected.textContent='Chưa chọn';el.results.innerHTML='';setResultsCollapsed(false);el.preview.innerHTML='';document.getElementById('itemEditor')?.classList.remove('active');el.quote.classList.remove('show');renderItems()}
function showTab(which){const db=which==='db';el.tabDb.classList.toggle('active',db);el.tabQuote.classList.toggle('active',!db);el.dbPanel.classList.toggle('active',db);el.quotePanel.classList.toggle('active',!db);el.quote.classList.remove('show');if(db)renderDbResults()}
function renderDbResults(){const arr=el.dbSearch.value.trim()?searchProducts(el.dbSearch.value,300):products.slice(0,80).map((r,i)=>({...r,_i:i}));el.dbResults.innerHTML=arr.map((r,i)=>resultHtml(r,i,'Sửa')).join('');el.dbResults.querySelectorAll('[data-i]').forEach((b,idx)=>b.onclick=()=>editProduct(arr[idx]._i))}
function editProduct(i){editingIndex=i;const r=products[i]||{};el.dbEditorTitle.textContent=r.productId||'Sản phẩm mới';el.pId.value=r.productId||'';el.pName.value=r.description||r.product||'';el.pMaterial.value=infer(r);el.pWeight.value=r.gold_weight_raw||'';el.pLabor.value=r.labor_x1000?plain(r.labor_x1000):'';el.pStonePrice.value=r.stone_x1000?plain(r.stone_x1000):'';el.pStone.value=r.stone||'';el.pStoneSize.value=r.stone_size||'';el.productStatus.textContent=''} function newProduct(){editingIndex=-1;['pId','pName','pWeight','pLabor','pStonePrice','pStone','pStoneSize'].forEach(k=>el[k].value='');el.pMaterial.value='';el.dbEditorTitle.textContent='Sản phẩm mới';el.productStatus.textContent=''} function saveProduct(){const name=el.pName.value.trim();if(!name){el.productStatus.textContent='Thiếu tên sản phẩm.';el.productStatus.className='status error';return}const row={productId:el.pId.value||nextProductId(),description:name,product:name,material:el.pMaterial.value,gold_weight_raw:el.pWeight.value,labor_x1000:n(el.pLabor.value)||'',stone_x1000:n(el.pStonePrice.value)||'',stone:el.pStone.value.trim(),stone_size:el.pStoneSize.value.trim(),gold_age:age(el.pMaterial.value)||'',searchKey:norm([name,el.pMaterial.value,el.pStone.value,el.pStoneSize.value].join(' ')),image_url:(editingIndex>=0?products[editingIndex].image_url:'')||''};if(editingIndex>=0)products[editingIndex]=row;else{products.unshift(row);editingIndex=0}saveDb();renderDbResults();el.productStatus.className='status';el.productStatus.textContent='Đã lưu ProductDB offline.';el.pId.value=row.productId;el.dbEditorTitle.textContent=row.productId} function nextProductId(){let max=0;for(const r of products){const m=String(r.productId||'').match(/(\d+)$/);if(m)max=Math.max(max,parseInt(m[1],10))}return 'PGP-'+String(max+1).padStart(5,'0')} function deleteProduct(){if(editingIndex<0)return;if(confirm('Xóa sản phẩm này khỏi ProductDB offline?')){products.splice(editingIndex,1);saveDb();newProduct();renderDbResults()}}
function exportDb(){const blob=new Blob([JSON.stringify(products,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='PetiteGem-ProductDB-offline.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),1000)}
el.date.value=new Date().toISOString().slice(0,10);if(!el.goldPrice.value)el.goldPrice.value=DEFAULT_GOLD_PRICE;if(!el.silverPrice.value)el.silverPrice.value=DEFAULT_SILVER_PRICE;if(el.priceStatus)el.priceStatus.textContent=`Vàng ${money(el.goldPrice.value)}/chỉ · Bạc ${money(el.silverPrice.value)}/chỉ`;loadDb();renderItems();el.tabQuote.onclick=()=>showTab('quote');el.tabDb.onclick=()=>showTab('db');let searchTimer=0;function scheduleSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(doSearch,120)}el.searchBtn.onclick=e=>{e.preventDefault();doSearch()};el.search.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();doSearch()}};el.search.addEventListener('input',scheduleSearch);el.toggleResults.onclick=()=>setResultsCollapsed(!resultsCollapsed);el.imageSearch?.addEventListener('change',doImageSearch);el.refreshPrices?.addEventListener('click',loadOnlinePrices);['item','material','weight','labor','stonePrice','stone','profit','override','goldPrice','silverPrice'].forEach(k=>el[k].addEventListener('input',refresh));el.material.onchange=()=>{if(!el.profit.value)el.profit.value=defaultProfit(el.material.value);refresh()};el.add.onclick=addItem;el.clear.onclick=clearAll;el.makeQuote.onclick=()=>renderQuote(true);el.printQuote.onclick=()=>{renderQuote(true);setTimeout(()=>print(),100)};el.dbSearch.oninput=renderDbResults;el.newProduct.onclick=newProduct;el.saveProduct.onclick=saveProduct;el.deleteProduct.onclick=deleteProduct;el.exportDb.onclick=exportDb;el.dbFile.onchange=async()=>{const f=el.dbFile.files[0];if(!f)return;try{const imported=JSON.parse(await f.text());if(!Array.isArray(imported))throw new Error('JSON phải là danh sách sản phẩm');products=imported;saveDb();renderDbResults();el.dbStatus.className='status';el.dbStatus.textContent='Đã import database mới.'}catch(e){el.dbStatus.textContent=e.message;el.dbStatus.className='status error'}};el.resetDb.onclick=()=>{if(confirm('Reset về database gốc nhúng trong app?')){localStorage.removeItem('petiteGemOfflineProductDB_v2');loadDb();renderDbResults();el.dbStatus.className='status';el.dbStatus.textContent='Đã quay lại database gốc trong app.'}};
