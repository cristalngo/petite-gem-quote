:root{--bg:#f7f2eb;--card:#fffdf8;--ink:#20262b;--muted:#68747c;--line:#ded4c7;--accent:#0f766e;--accent2:#115e59;--gold:#c9a44d;--soft:#fff6d6;--danger:#b91c1c;}
*{box-sizing:border-box} html,body{max-width:100%;overflow-x:hidden;-webkit-text-size-adjust:100%} body{margin:0;background:linear-gradient(180deg,rgba(15,118,110,.13),transparent 250px),var(--bg);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif} button,input,select,textarea{font:inherit} input,select,textarea{font-size:16px} button{min-height:42px;border:0;border-radius:10px;background:var(--accent);color:white;font-weight:850;padding:0 14px} button.secondary{background:#eef5f2;color:var(--accent2)} button.warn{background:#fff1c2;color:#6b4b04} button.danger{background:#fee2e2;color:#991b1b} button:disabled{background:#a8b0b4;color:white} input,select{width:100%;min-width:0;min-height:42px;border:1px solid var(--line);border-radius:10px;background:white;color:var(--ink);padding:9px 11px} input:focus,select:focus{outline:none;border-color:#dd9700;box-shadow:0 0 0 3px rgba(221,151,0,.13)}
.app{width:100%;max-width:720px;margin:0 auto;padding:calc(10px + env(safe-area-inset-top)) 10px calc(24px + env(safe-area-inset-bottom));overflow-x:hidden} .hero{display:flex;align-items:center;gap:10px;padding:4px 2px 10px} .logo{width:48px;height:48px;border-radius:50%;object-fit:cover;box-shadow:0 10px 26px rgba(79,55,11,.12)} h1{margin:0;font:800 26px/1 Georgia,"Times New Roman",serif} h2{margin:0;font-size:18px} .muted{color:var(--muted)} .small{font-size:12px;font-weight:750;color:var(--muted)}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:4px 0 10px;position:sticky;top:0;z-index:3;background:rgba(247,242,235,.96);padding:4px 0} .tabs button{background:#edf4f2;color:#164e46} .tabs button.active{background:var(--accent);color:white} .panel{display:none} .panel.active{display:block}
.card{background:rgba(255,253,248,.96);border:1px solid rgba(201,164,77,.34);border-radius:12px;box-shadow:0 10px 24px rgba(58,47,28,.06);margin-bottom:10px;padding:11px;max-width:100%;overflow:hidden} .title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px} label{display:grid;gap:5px;color:var(--muted);font-size:12px;font-weight:850;text-transform:uppercase} .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px} .wide{grid-column:1/-1} .row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end;max-width:100%} .actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center} .status{font-size:13px;font-weight:750;color:var(--muted);margin-top:8px} .error{color:var(--danger)}
.list{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:10px;background:white} .list:empty{display:none} .result,.item{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;width:100%;text-align:left;padding:10px;border-bottom:1px solid var(--line);background:white;color:var(--ink)} .result:nth-child(odd),.item:nth-child(odd){background:#fff9e5} .result:last-child,.item:last-child{border-bottom:0} .thumb{width:46px;height:46px;border-radius:10px;background:#f4f4f4;border:1px solid var(--line);object-fit:cover;display:grid;place-items:center;color:var(--muted);font-size:12px;font-weight:800;overflow:hidden} .result strong,.item strong{display:block;font-size:16px} .result small,.item small{display:block;color:var(--muted);font-size:12px;line-height:1.35;margin-top:3px}
.preview{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:var(--soft);border:1px solid #ead79a;border-radius:12px;margin:12px 0;padding:11px} .preview:empty{display:none} .metric{display:grid;gap:2px} .metric b{color:var(--muted);font-size:11px;text-transform:uppercase} .total{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:13px;border-radius:12px;background:var(--accent);color:white;font-weight:950;font-size:20px;margin-top:10px}
.quote{display:none;background:#fffdf8;border-radius:14px;padding:16px} .quote.show{display:block} .quote-head{display:flex;gap:12px;align-items:center;border-bottom:4px solid var(--gold);padding-bottom:12px;margin-bottom:14px} .quote-head img{width:66px;height:66px;border-radius:50%;object-fit:cover} .quote-head h3{margin:0;font:800 30px/1 Georgia,"Times New Roman",serif} .quote-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px} .quote-meta div{border-bottom:1px solid #d6c69c;padding-bottom:7px} .quote-meta strong{display:block;color:var(--muted);font-size:11px;text-transform:uppercase} table{width:100%;border-collapse:collapse} th{background:#f7eab5;text-align:left} th,td{padding:9px 6px;border-bottom:1px solid #d6c69c} td:last-child,th:last-child{text-align:right} .note{color:var(--muted);font-size:13px;margin:14px 0 6px}

.db-tools summary{display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:16px;font-weight:900;list-style:none}.db-tools summary::-webkit-details-marker{display:none}.db-tools[open] summary{margin-bottom:10px}.compact-actions button{min-width:88px}.quote-panel-spacer{height:1px}
@media(max-width:640px){.app{padding-left:8px;padding-right:8px}.hero{margin-top:2px}.logo{width:42px;height:42px}h1{font-size:25px}.tabs button{font-size:18px;min-height:48px}.grid{grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}.card{padding:10px}.row{grid-template-columns:1fr}.row button{width:100%}.actions button{flex:1}.preview{grid-template-columns:1fr}.result,.item{grid-template-columns:40px minmax(0,1fr)}.thumb{width:40px;height:40px}.result strong,.item strong{font-size:15px;line-height:1.18}.result small,.item small{font-size:11px}.quote-meta{grid-template-columns:1fr}.hide-mobile{display:none}}
@media(max-width:420px){.grid{grid-template-columns:1fr}.tabs{gap:6px}.tabs button{font-size:17px}.hero .small{font-size:11px}h1{font-size:24px}label{font-size:11px}.title h2{font-size:17px}}

.search-row{margin-top:6px}

.quote-settings{display:none}
.item-editor{display:none;margin:0;border-radius:0;border-left:0;border-right:0;box-shadow:none;background:#fffdf8}

.phone-tabs{display:none!important}.db-ui-hidden{display:none!important}.image-search-label{margin-top:8px}.image-search-label input{padding:8px;background:#fff}.results-collapsed #results{display:none}.result-toggle{position:fixed;right:12px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:20;min-height:42px;border-radius:999px;box-shadow:0 10px 24px rgba(15,118,110,.24);padding:0 16px}.result-toggle[hidden]{display:none}.price-tools{padding:9px 10px}.price-tools .row{grid-template-columns:1fr auto}.price-tools b{color:var(--accent2)}.price-tools button{min-width:108px}

async function fetchText(url){
  const tries=[
    url,
    'https://api.allorigins.win/raw?url='+encodeURIComponent(url),
    'https://corsproxy.io/?'+encodeURIComponent(url),
    'https://thingproxy.freeboard.io/fetch/'+url
  ];
  let last;
  for(const u of tries){
    try{
      const controller=new AbortController();
      const timer=setTimeout(()=>controller.abort(),12000);
      const r=await fetch(u,{cache:'no-store',signal:controller.signal});
      clearTimeout(timer);
      if(r.ok)return await r.text();
      last=r.status
    }catch(e){last=e}
  }
  throw last||new Error('fetch failed')
}
function htmlText(x){
  return x.replace(/<script[\s\S]*?<\/script>/gi,' ').replace(/<style[\s\S]*?<\/style>/gi,' ').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ')
}
function nums(t){
  return (t.match(/\d+(?:[.,]\d{1,3}){0,3}/g)||[]).map(marketNum).filter(Boolean)
}
function silverSellPerChi(rawHtml){
  const text=htmlText(rawHtml);
  const rows=text.split(/(?=Bạc|BAC|Silver|SILVER)/);
  const rowCandidates=[];
  for(const row of rows){
    const hay=norm(row);
    if(!hay.includes('bac'))continue;
    if(!(hay.includes('999')||hay.includes('phu quy')||hay.includes('mieng')||hay.includes('luong')))continue;
    const vals=nums(row);
    rowCandidates.push(...vals.filter(v=>v>=180&&v<=500));
    rowCandidates.push(...vals.filter(v=>v>=1800&&v<=5000&&(v<2020||v>2035)).map(v=>v/10));
    rowCandidates.push(...vals.filter(v=>v>=1800000&&v<=5000000).map(v=>v/10000));
  }
  const allNums=nums(text);
  const all=[
    ...allNums.filter(v=>v>=180&&v<=500),
    ...allNums.filter(v=>v>=1800000&&v<=5000000).map(v=>v/10000)
  ];
  return rowCandidates.length?Math.max(...rowCandidates):(all.length?Math.max(...all):0)
}

    const gj=await fetchText('https://edge-api.pnj.io/ecom-frontend/v1/get-gold-price?zone=00');
    const vals=(gj.match(/(?:sell|ban|bán|gia_ban|giaban|price_sell|sellprice|selling)["']?\s*:\s*["']?[\d,.]+/gi)||[]).map(normGold).filter(x=>x>=12000&&x<=25000);
    gold=vals.length?Math.max(...vals):0
  }catch(e){}
  if(!gold){

      const t=htmlText(await fetchText('https://www.pnj.com.vn/site/gia-vang'));
      const vals=nums(t).map(normGold).filter(x=>x>=12000&&x<=25000);
      gold=vals.length?Math.max(...vals):0
    }catch(e){}
  }

  }catch(e){}

  renderItems();

}

function createQuoteAndClearItems(){if(!items.length)return;renderQuote(true);items=[];renderItems()}
function clearAll(){selected=null;results=[];items=[];['search','item','weight','labor','stonePrice','stone','profit','override','quickName','quickPrice'].forEach(k=>el[k].value='');el.quickQty.value='1';el.goldPrice.value=DEFAULT_GOLD_PRICE;el.material.value='';el.silverPrice.value=DEFAULT_SILVER_PRICE;el.selected.textContent='Chưa chọn';el.results.innerHTML='';setResultsCollapsed(false);el.preview.innerHTML='';document.getElementById('itemEditor')?.classList.remove('active');el.quote.classList.remove('show');renderItems()}
function showTab(which){const db=which==='db';el.tabDb.classList.toggle('active',db);el.tabQuote.classList.toggle('active',!db);el.dbPanel.classList.toggle('active',db);el.quotePanel.classList.toggle('active',!db);el.quote.classList.remove('show');if(db)renderDbResults()}
function renderDbResults(){const arr=el.dbSearch.value.trim()?searchProducts(el.dbSearch.value,300):products.map((r,i)=>({...r,_i:i}));el.dbResults.innerHTML=arr.map((r,i)=>resultHtml(r,i,'Sửa')).join('');el.dbResults.querySelectorAll('[data-i]').forEach((b,idx)=>b.onclick=()=>editProduct(arr[idx]._i))}
function editProduct(i){editingIndex=i;const r=products[i]||{};el.dbEditorTitle.textContent=r.productId||'Sản phẩm mới';el.pId.value=r.productId||'';el.pName.value=r.description||r.product||'';el.pMaterial.value=infer(r);el.pWeight.value=r.gold_weight_raw||'';el.pLabor.value=r.labor_x1000?plain(r.labor_x1000):'';el.pStonePrice.value=r.stone_x1000?plain(r.stone_x1000):'';el.pStone.value=r.stone||'';el.pStoneSize.value=r.stone_size||'';el.productStatus.textContent=''} function newProduct(){editingIndex=-1;['pId','pName','pWeight','pLabor','pStonePrice','pStone','pStoneSize'].forEach(k=>el[k].value='');el.pMaterial.value='';el.dbEditorTitle.textContent='Sản phẩm mới';el.productStatus.textContent=''} function saveProduct(){const name=el.pName.value.trim();if(!name){el.productStatus.textContent='Thiếu tên sản phẩm.';el.productStatus.className='status error';return}const row={productId:el.pId.value||nextProductId(),description:name,product:name,material:el.pMaterial.value,gold_weight_raw:el.pWeight.value,labor_x1000:n(el.pLabor.value)||0,stone_x1000:n(el.pStonePrice.value)||0,stone:el.pStone.value.trim(),stone_size:el.pStoneSize.value.trim(),gold_age:age(el.pMaterial.value)||'',searchKey:norm([name,el.pMaterial.value,el.pStone.value,el.pStoneSize.value].join(' ')),image_url:(editingIndex>=0?products[editingIndex].image_url:'')||''};if(!quotable(row)){el.productStatus.textContent='Cần có tên, chất liệu Bạc/Vàng và trọng lượng để lưu DB.';el.productStatus.className='status error';return}if(editingIndex>=0)products[editingIndex]=row;else{products.unshift(row);editingIndex=0}saveDb();renderDbResults();el.productStatus.className='status';el.productStatus.textContent='Đã lưu ProductDB offline.';el.pId.value=row.productId;el.dbEditorTitle.textContent=row.productId} function nextProductId(){let max=0;for(const r of products){const m=String(r.productId||'').match(/(\d+)$/);if(m)max=Math.max(max,parseInt(m[1],10))}return 'PGP-'+String(max+1).padStart(5,'0')} function deleteProduct(){if(editingIndex<0)return;if(confirm('Xóa sản phẩm này khỏi ProductDB offline?')){products.splice(editingIndex,1);saveDb();newProduct();renderDbResults()}}
function exportDb(){const blob=new Blob([JSON.stringify(products,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='PetiteGem-ProductDB-offline.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),1000)}
el.date.value=new Date().toISOString().slice(0,10);if(!el.goldPrice.value)el.goldPrice.value=DEFAULT_GOLD_PRICE;if(!el.silverPrice.value)el.silverPrice.value=DEFAULT_SILVER_PRICE;if(el.priceStatus)el.priceStatus.textContent=`Vàng ${money(el.goldPrice.value)}/chỉ · Bạc ${money(el.silverPrice.value)}/chỉ`;loadDb();renderItems();el.tabQuote.onclick=()=>showTab('quote');el.tabDb.onclick=()=>showTab('db');let searchTimer=0;function scheduleSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(doSearch,120)}el.searchBtn.onclick=e=>{e.preventDefault();doSearch()};el.search.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();doSearch()}};el.search.addEventListener('input',scheduleSearch);el.toggleResults.onclick=()=>setResultsCollapsed(!resultsCollapsed);el.imageSearch?.addEventListener('change',doImageSearch);el.refreshPrices?.addEventListener('click',loadOnlinePrices);['item','material','weight','labor','stonePrice','stone','profit','override','goldPrice','silverPrice'].forEach(k=>el[k].addEventListener('input',refresh));el.material.onchange=()=>{if(!el.profit.value)el.profit.value=defaultProfit(el.material.value);refresh()};el.add.onclick=addItem;el.quickAdd.onclick=addQuickItem;el.clear.onclick=clearAll;el.makeQuote.onclick=createQuoteAndClearItems;el.printQuote.onclick=()=>{renderQuote(true);setTimeout(()=>print(),100)};el.dbSearch.oninput=renderDbResults;el.newProduct.onclick=newProduct;el.saveProduct.onclick=saveProduct;el.deleteProduct.onclick=deleteProduct;el.exportDb.onclick=exportDb;el.dbFile.onchange=async()=>{const f=el.dbFile.files[0];if(!f)return;try{const imported=JSON.parse(await f.text());if(!Array.isArray(imported))throw new Error('JSON phải là danh sách sản phẩm');const before=imported.length;products=imported.filter(quotable);saveDb();renderDbResults();el.dbStatus.className='status';el.dbStatus.textContent=`Đã import ${products.length} sản phẩm hợp lệ${before-products.length?`, bỏ ${before-products.length} dòng thiếu dữ liệu`:''}.`}catch(e){el.dbStatus.textContent=e.message;el.dbStatus.className='status error'}};el.resetDb.onclick=()=>{if(confirm('Reset về database gốc nhúng trong app?')){localStorage.removeItem('petiteGemOfflineProductDB_v2');loadDb();renderDbResults();el.dbStatus.className='status';el.dbStatus.textContent='Đã quay lại database gốc trong app.'}};
